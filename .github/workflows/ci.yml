name: CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main]

jobs:
  test-windows:
    name: Tests (Windows / Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev,readline]"
      - name: Run deterministic tests
        run: python -m pytest tests -q -m "not provider_live and not ollama_live and not model_quality and not slow" --tb=short
      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

  test-ubuntu:
    name: Tests (Ubuntu / Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run deterministic tests
        run: python -m pytest tests -q -m "not provider_live and not ollama_live and not model_quality and not slow" --tb=short

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check app/ cli/ codex/ --select E,W,F --ignore E501,E402

  smoke-test:
    name: Install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and install wheel
        run: |
          pip install build
          python -m build --wheel
          pip install dist/*.whl
      - name: Version smoke test
        run: ilx --version
      - name: Help smoke test
        run: ilx --help
