name: CI

on:
  push:
    branches: [main, master, develop, "release/**"]
  pull_request:
    branches: [main, master]

jobs:
  test-windows:
    name: Tests (Windows / Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev,readline]"
      - name: Run deterministic tests
        run: python -m pytest tests -q -m "not provider_live and not ollama_live and not model_quality and not slow" --tb=short --cov=app --cov=cli --cov=codex --cov-fail-under=50 --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-windows-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7
      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel

  test-ubuntu:
    name: Tests (Ubuntu / Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run deterministic tests
        run: python -m pytest tests -q -m "not provider_live and not ollama_live and not model_quality and not slow" --tb=short --cov=app --cov=cli --cov=codex --cov-fail-under=50 --cov-report=term-missing --cov-report=xml
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ubuntu-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check app/ cli/ codex/
      - name: Type check (mypy)
        run: |
          pip install mypy
          mypy app/ cli/ codex/ --ignore-missing-imports --no-error-summary || true

  security-scan:
    name: Security scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        run: bandit -r app/ cli/ codex/ -ll --skip B101,B601,B603,B608 -f json -o bandit-report.json || true
      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  version-check:
    name: Version consistency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check version sync
        run: python scripts/check_version.py

  smoke-test:
    name: Install smoke test
    runs-on: ubuntu-latest
    needs: [test-windows, test-ubuntu, lint, security-scan, version-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build and install wheel
        run: |
          pip install build
          python -m build
          pip install dist/*.whl
      - name: Version smoke test
        run: ilx --version
      - name: Help smoke test
        run: ilx --help
